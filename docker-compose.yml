services:
  db:
    image: postgres:16-alpine
    container_name: qvp_db
    environment:
      POSTGRES_DB: subscriptions
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d subscriptions"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
