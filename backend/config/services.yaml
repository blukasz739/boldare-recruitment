parameters:
    openrouter.api_url: '%env(OPENROUTER_API_URL)%'
    openrouter.model: '%env(OPENROUTER_MODEL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Service\Import\OpenRouterClient:
        arguments:
            $openRouterApiUrl: '%openrouter.api_url%'
            $openRouterModel: '%openrouter.model%'
